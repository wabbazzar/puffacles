<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Puffy Runner</title>
    <style>
        :root {
            /* Read via JS to push HUD below the iPhone notch in PWA / full-screen. */
            --sat: env(safe-area-inset-top, 0px);
            --sar: env(safe-area-inset-right, 0px);
            --sal: env(safe-area-inset-left, 0px);
            --sab: env(safe-area-inset-bottom, 0px);
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f7f7f7;
            font-family: monospace;
            touch-action: none;
            overscroll-behavior: none;
        }
        #game-container {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
        }
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

    <script src="game/sprites/PuffySprite.js?v=2"></script>
    <script src="game/scenes/PuffyRunnerScene.js?v=2"></script>

    <script>
        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            pixelArt: false,
            backgroundColor: '#f7f7f7',
            scale: {
                mode: Phaser.Scale.RESIZE,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: window.innerWidth,
                height: window.innerHeight
            },
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: false
                }
            },
            scene: [PuffyRunnerScene]
        };

        window.game = new Phaser.Game(config);
        console.log('Puffy Runner initialized');
    </script>
</body>
</html>
